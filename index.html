<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Report</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    h2 {
      text-align:center;
      background: linear-gradient(90deg, #2980b9, #6dd5fa);
      color:#fff;
      padding:14px;
      border-radius:8px;
      margin-bottom:15px;
      font-weight:bold;
      letter-spacing:1px;
      box-shadow:0 4px 6px rgba(0,0,0,0.2);
    }
    table { margin:auto; border-collapse:collapse; width:90%; }
    th, td { border:1px solid #ccc; padding:8px; text-align:center; }
    th { background:#f0f0f0; }
    .filter-box { text-align:center; margin:20px 0; }
    #loading { text-align:center; font-weight:bold; margin:10px; }
  </style>
</head>
<body>
  <!-- Dynamic Heading -->
  <h2 id="reportHeading">Daily Report</h2>

  <!-- Date Range Filter -->
  <div class="filter-box">
    <label for="startDate">Start Date:</label>
    <input type="text" id="startDate" placeholder="dd/mm/yyyy">

    <label for="endDate" style="margin-left:15px;">End Date:</label>
    <input type="text" id="endDate" placeholder="dd/mm/yyyy">

    <button id="applyRange" style="margin-left:15px;">Apply</button>
  </div> 

  <!-- Name Filter -->
  <div class="filter-box">
    <label for="nameFilter">Select Name:</label>
    <select id="nameFilter">
      <option value="">All Employees</option>
    </select>
  </div>

  <!-- Heading Filter -->
  <div class="filter-box">
    <label for="headingFilter">Select Heading:</label>
    <select id="headingFilter">
      <option value="Daily Report">Daily Report</option>
      <option value="Attendance Report">Attendance Report</option>
      <option value="Activity Report">Activity Report</option>
    </select>
  </div>

  <!-- Loading message -->
  <div id="loading">Loading data, please wait...</div>

  <!-- Table -->
  <table id="employeeTable">
    <tr>
      <th>Date</th>
      <th>Line</th>
      <th>Name</th>
      <th>Activity</th>
      <th>Location</th>
      <th>Status</th>
    </tr>
  </table>

  <!-- PapaParse library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <script>
    let parsedData = [];

    // Fetch CSV from Google Sheets
    fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRpc4H0TN40P_UMrs-0DUaxXx4joitx5dylz5aB6V1fRSCBDySQbgBuyztbllxkfFNfMwkE6dXkkN34/pub?output=csv")
      .then(res => res.text())
      .then(csvText => {
        let parsed = Papa.parse(csvText, { header: false });
        parsedData = parsed.data;
        renderTable(parsedData); // initial load
        populateNameFilter(parsedData); // fill dropdown with names
        document.getElementById("loading").style.display = "none"; 
      })
      .catch(err => {
        console.error("Fetch error:", err);
        document.getElementById("loading").textContent = "डेटा लोड करने में समस्या हुई।";
      });

    // Render table
    function renderTable(data) {
  let table = document.getElementById("employeeTable");
  table.innerHTML = "";

  // 🔥 Dynamic header row from CSV
  let headerRow = document.createElement("tr");
  data[0].forEach(col => {
    let th = document.createElement("th");
    th.textContent = col;
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);
    // बाकी rows
      data.forEach((row, idx) => {
    if (idx === 0) return; // skip header
    if (!row || row.length === 0 || (row.length === 1 && row[0] === "")) return;
    let tr = document.createElement("tr");
    row.forEach(col => {
      let td = document.createElement("td");
      td.textContent = col;
      tr.appendChild(td);
    });
    table.appendChild(tr);
  });
}
    // Populate name filter 
    function populateNameFilter(data) {
      let nameSet = new Set();
      data.forEach((row, idx) => {
        if (idx === 0) return; 
        if (row[2]) nameSet.add(row[2]); 
      });
      let select = document.getElementById("nameFilter");
      nameSet.forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    }

    // Parse dd/mm/yyyy format
    function parseDate(str) {
      if (!str) return null;
      let [day, month, year] = str.split("/");
      return new Date(year, month - 1, day);
    }

    // Apply filter (Date + Name + Heading)
    function applyFilters() {
      let start = parseDate(document.getElementById("startDate").value.trim());
      let end = parseDate(document.getElementById("endDate").value.trim());
      let selectedName = document.getElementById("nameFilter").value;
      let selectedHeading = document.getElementById("headingFilter").value;

      let filtered = parsedData.filter((row, idx) => {
        if (idx === 0) return false;
        let rowDate = parseDate(row[0]);
        let dateMatch = (!start || !end) || (rowDate && rowDate >= start && rowDate <= end);
        let nameMatch = !selectedName || row[2] === selectedName;
        return dateMatch && nameMatch;
      });

      renderTable(filtered);

      // 🔥 Dynamic Heading Update
      let heading = selectedHeading;
      if (selectedName) heading += " – " + selectedName;
      if (start && end) {
        heading += " (" + document.getElementById("startDate").value + 
                   " – " + document.getElementById("endDate").value + ")";
      }
      document.getElementById("reportHeading").textContent = heading;
    }

    // Event listeners
    document.getElementById("applyRange").addEventListener("click", applyFilters);
    document.getElementById("nameFilter").addEventListener("change", applyFilters);
    document.getElementById("headingFilter").addEventListener("change", applyFilters);
  </script>
</body>
</html>
